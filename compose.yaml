services:
  command_service:
    build: springboot_cqrs_command/.
    container_name: springboot_cqrs_command
    env_file:
      - ./env.properties
    ports:
      - "8181:8080"
    depends_on:
      - postgres

  query_service:
    build: springboot_cqrs_query/.
    container_name: springboot_cqrs_query
    env_file:
      - ./env.properties
    ports:
      - "8182:8081"
    depends_on:
      - postgres

  frontend_service:
    build: react_mui_cqrs/.
    container_name: react_mui_cqrs
    ports:
      - "80:3000"

  # ── Local development Postgres ────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: ledger_postgres_local
    environment:
      POSTGRES_DB: record
      POSTGRES_USER: springboot_admin
      POSTGRES_PASSWORD: password
    ports:
      - "5433:5432"
    volumes:
      - ledger_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U springboot_admin -d record"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  ledger_pgdata:
